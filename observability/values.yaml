elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch:8.19.1
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

logstash:
  image: docker.elastic.co/logstash/logstash:8.19.1
  replicas: 1

kibana:
  image: docker.elastic.co/kibana/kibana:8.19.1
  replicas: 1

zipkin:
  image: openzipkin/zipkin:3.5
  replicas: 1

prometheus:
  image: prom/prometheus:latest
  replicas: 1

grafana:
  image: grafana/grafana:latest
  replicas: 1
  adminUser: admin
  adminPassword: admin